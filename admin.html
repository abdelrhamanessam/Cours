<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mr Maths Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" crossorigin="anonymous">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js" crossorigin="anonymous"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/mammoth@1.8.0/mammoth.browser.min.js"></script>
<style>
:root{--z-modal:100;--z-modal-backdrop:99;--z-sticky:50;--z-tooltip:200;--z-toast:300}
.admin-body{padding:40px 0}
.admin-login{max-width:360px;margin:80px auto;text-align:center}
.admin-login h1{margin-bottom:24px;font-size:1.5rem;font-weight:800;text-wrap:balance}
.admin-input{width:100%;padding:12px 16px;border:1px solid var(--border);border-radius:var(--radius);font-size:.9375rem;margin-bottom:12px;background:var(--bg);color:var(--ink);box-sizing:border-box;transition:border-color .15s}
.admin-input:focus{border-color:var(--primary);outline:none;box-shadow:0 0 0 3px oklch(0.8 0.15 85 / .15)}
.admin-layout{display:flex;gap:32px;min-height:calc(100vh - 120px)}
.admin-main{flex:1;min-width:0}
.admin-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid var(--border);gap:12px}
.admin-header h1{font-size:1.25rem;font-weight:700;margin:0}
.admin-header-actions{display:flex;gap:8px;align-items:center;flex-shrink:0}
.hidden{display:none!important}
.admin-page{display:none}
.admin-page.active{display:block}
@keyframes fadeSlide{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
@media(prefers-reduced-motion:no-preference){.admin-page.active{animation:fadeSlide .2s ease}}

.admin-sidebar{width:200px;flex-shrink:0;position:sticky;top:40px;align-self:start}
.admin-sidebar a{display:flex;align-items:center;gap:10px;padding:10px 14px;color:var(--muted);text-decoration:none;border-radius:var(--radius);margin-bottom:2px;font-weight:500;font-size:.875rem;cursor:pointer;transition:background .15s,color .15s;outline:none}
.admin-sidebar a:focus-visible{box-shadow:inset 0 0 0 2px var(--primary)}
.admin-sidebar a:hover{color:var(--ink);background:var(--surface)}
.admin-sidebar a.active{color:var(--ink);background:var(--primary);font-weight:600}
.admin-sidebar a svg{width:18px;height:18px;flex-shrink:0}

/* Professional course cards */
.crs-list{display:flex;flex-direction:column;gap:12px}
.crs-card{background:#fff;border:1px solid oklch(0.88 0.015 85);border-radius:20px;overflow:hidden;transition:box-shadow .3s cubic-bezier(.16,1,.3,1),translate .25s;box-shadow:0 4px 16px oklch(0 0 0 / .03)}
.crs-card:hover{box-shadow:0 8px 28px oklch(0 0 0 / .06);translate:0 -1px}
.crs-card-header{display:flex;align-items:flex-start;gap:16px;padding:18px 22px;cursor:pointer;user-select:none}
.crs-card-header:hover{background:oklch(0.985 0.005 85)}
.crs-icon{width:40px;height:40px;border-radius:14px;background:var(--primary-soft);display:flex;align-items:center;justify-content:center;font-size:1.25rem;flex-shrink:0;line-height:1}
.crs-info{flex:1;min-width:0}
.crs-info .crs-title{font-weight:700;font-size:1rem;color:var(--ink);display:flex;align-items:center;gap:10px;flex-wrap:wrap;letter-spacing:-.02em}
.crs-info .crs-desc{font-size:.8125rem;color:var(--muted);margin-top:3px;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.crs-meta{display:flex;gap:12px;margin-top:8px;flex-wrap:wrap}
.crs-meta-item{font-size:.6875rem;color:var(--muted);display:flex;align-items:center;gap:4px}
.crs-meta-item strong{font-weight:600;color:var(--ink)}
.crs-badge{font-size:.625rem;padding:3px 10px;border-radius:999px;background:var(--primary-soft);color:var(--primary);font-weight:700;letter-spacing:.04em;flex-shrink:0;line-height:1.6}
.crs-actions{display:flex;gap:6px;align-items:center;flex-shrink:0}
.crs-expand-icon{color:var(--muted);font-size:.75rem;transition:transform .3s ease;flex-shrink:0}
.crs-card.open .crs-expand-icon{transform:rotate(180deg)}
.crs-body{padding:0 22px 18px;display:none}
.crs-card.open .crs-body{display:block;animation:fadeSlide .2s ease}

/* Lessons table inside card */
.lessons-table{width:100%;border-collapse:collapse;font-size:.8125rem;margin-top:8px}
.lessons-table th{text-align:left;padding:10px 14px;font-size:.65rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;background:oklch(0.97 0.005 85);border-bottom:1px solid oklch(0.90 0.01 85)}
.lessons-table td{padding:10px 14px;border-bottom:1px solid oklch(0.92 0.008 85);vertical-align:middle;line-height:1.4}
.lessons-table tr:last-child td{border-bottom:none}
.lessons-table tr:hover td{background:oklch(0 0 0 / .015)}
.lt-title{font-weight:600;color:var(--ink)}
.lt-status{display:flex;gap:4px;align-items:center}
.lt-status-dot{width:6px;height:6px;border-radius:50%;display:inline-block}
.lt-status-dot.active{background:var(--success)}
.lt-status-dot.inactive{background:var(--border)}
.lt-status-dot.partial{background:var(--warning)}
.lt-actions{display:flex;gap:4px;align-items:center;flex-wrap:wrap;justify-content:flex-end}
.lt-tag{font-size:.625rem;padding:2px 7px;border-radius:4px;font-weight:600;line-height:1.4;display:inline-flex;align-items:center;gap:3px}
.lt-tag-hw{background:oklch(0.6 0.155 145 / .1);color:var(--success)}
.lt-tag-exam{background:oklch(0.72 0.14 85 / .12);color:var(--warning)}
.lt-tag-both{background:oklch(0.65 0.12 235 / .1);color:oklch(0.4 0.14 255)}
.lt-tag-none{background:oklch(0 0 0 / .04);color:var(--muted)}
.lessons-add-row td{padding-top:12px;border-bottom:none!important}

/* Modal */
.admin-modal{position:fixed;top:0;left:0;width:100%;height:100%;background:oklch(0 0 0 / .35);display:none;align-items:center;justify-content:center;z-index:var(--z-modal-backdrop);backdrop-filter:blur(2px)}
.admin-modal.show{display:flex}
.admin-modal-content{background:var(--bg);border-radius:16px;padding:28px 32px;max-width:720px;width:90%;max-height:80vh;overflow-y:auto;box-shadow:0 16px 48px oklch(0 0 0 / .12);z-index:var(--z-modal);position:relative}
.admin-modal-content h2{margin-bottom:16px;font-size:1.125rem;font-weight:700}
.admin-modal-content label{display:block;font-size:.75rem;font-weight:600;margin-bottom:3px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
.admin-modal-content input,.admin-modal-content textarea,.admin-modal-content select{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:var(--radius);margin-bottom:10px;font-size:.875rem;background:var(--bg);color:var(--ink);box-sizing:border-box;transition:border-color .15s;font-family:inherit}
.admin-modal-content input:focus,.admin-modal-content textarea:focus,.admin-modal-content select:focus{border-color:var(--primary);outline:none;box-shadow:0 0 0 3px oklch(0.8 0.15 85 / .15)}
.admin-modal-content textarea{min-height:60px;resize:vertical}
.admin-modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}
.btn-danger{background:var(--error);color:white;border-color:var(--error)}
.btn-danger:hover{opacity:.88;box-shadow:0 1px 6px oklch(0.52 0.185 30 / .25)}
.btn-danger:focus-visible{box-shadow:0 0 0 3px oklch(0.52 0.185 30 / .3)}
.btn:disabled,.btn-primary:disabled,.btn-accent:disabled,.btn-ghost:disabled{opacity:.4;cursor:not-allowed;pointer-events:none}

/* Content tabs inside modal */
.md-tabs{display:flex;gap:4px;margin-bottom:20px;background:var(--surface);border-radius:var(--radius);padding:4px;flex-wrap:wrap;position:sticky;top:0;z-index:1}
.md-tabs button{padding:8px 18px;font-size:.8125rem;font-weight:500;border-radius:calc(var(--radius) - 2px);border:none;background:transparent;cursor:pointer;color:var(--muted);transition:all .15s;font-family:inherit}
.md-tabs button:hover{color:var(--ink);background:oklch(0 0 0 / .04)}
.md-tabs button.active{background:var(--bg);color:var(--ink);font-weight:600;box-shadow:0 1px 4px oklch(0 0 0 / .08)}
.md-tab-content{display:none}
.md-tab-content.active{display:block;animation:fadeSlide .18s ease}

/* Lesson editor section */
.lesson-editor{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px 20px;margin-bottom:20px}
.lesson-editor-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.lesson-editor .le-full{grid-column:1/-1}
.lesson-editor label{font-size:.6875rem;margin-bottom:2px}
.lesson-editor input,.lesson-editor textarea{margin-bottom:0}

/* Question rows */
.qs-list{display:flex;flex-direction:column;gap:4px}
.q-row{display:flex;align-items:center;padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:8px;font-size:.8125rem;gap:12px;transition:all .15s}
.q-row:hover{border-color:oklch(0.72 0.14 85 / .2);box-shadow:0 1px 4px oklch(0 0 0 / .04)}
.q-row .q-info{flex:1;min-width:0}
.q-row .q-info .q-text{font-weight:600;display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.q-row .q-info .q-meta{color:var(--muted);font-size:.6875rem;margin-top:2px;display:flex;gap:6px;flex-wrap:wrap}
.q-row .q-actions{display:flex;gap:4px;flex-shrink:0}
.q-row-image{max-width:100px;max-height:50px;border-radius:4px;border:1px solid var(--border);flex-shrink:0;object-fit:cover;cursor:pointer}
.q-meta-tag{display:inline-flex;align-items:center;gap:3px;padding:1px 6px;border-radius:3px;font-size:.625rem;font-weight:600}
.q-meta-tag.math{background:oklch(0.55 0.14 265 / .1);color:oklch(0.35 0.14 265)}
.q-meta-tag.img{background:oklch(0.6 0.155 145 / .1);color:var(--success)}
.q-meta-tag.imgq{background:oklch(0.72 0.14 85 / .12);color:var(--warning)}

/* Dynamic exam config panel */
.exam-config{border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:20px}
.exam-config-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--surface);cursor:pointer;user-select:none;font-weight:600;font-size:.8125rem;transition:background .12s}
.exam-config-header:hover{background:oklch(0 0 0 / .02)}
.exam-config-header .ec-toggle{color:var(--muted);font-size:.75rem;transition:transform .2s}
.exam-config.open .exam-config-header .ec-toggle{transform:rotate(180deg)}
.exam-config-body{padding:16px;display:none;border-top:1px solid var(--border);background:var(--bg)}
.exam-config.open .exam-config-body{display:block;animation:fadeSlide .18s ease}
.ec-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.ec-grid label{font-size:.6875rem;text-transform:none;letter-spacing:0;font-weight:500;color:var(--muted);display:flex;flex-direction:column;gap:3px}
.ec-grid input{padding:8px 12px;margin:0}
.ec-row{display:flex;align-items:center;gap:8px;font-size:.8125rem;margin-bottom:10px}
.ec-summary{font-size:.75rem;color:var(--muted);padding:8px 12px;background:var(--surface);border-radius:6px;margin-top:8px;display:flex;gap:12px;flex-wrap:wrap}
.ec-summary span{display:flex;align-items:center;gap:4px}

/* Option rows in question form */
.opt-row{display:flex;align-items:center;gap:8px;margin:4px 0;padding:8px 10px;border-radius:var(--radius);border:1.5px solid var(--border);background:var(--surface);transition:border-color .15s}
.opt-row:hover{border-color:oklch(0.68 0.175 91.3 / .35)}
.opt-row:focus-within{border-color:var(--primary)}
.opt-row input[type="radio"]{appearance:none;width:18px;height:18px;border:2px solid var(--border);border-radius:50%;cursor:pointer;flex-shrink:0;position:relative;transition:border-color .15s,background .15s;margin:0}
.opt-row input[type="radio"]:checked{border-color:var(--success);background:var(--success)}
.opt-row input[type="radio"]:checked::after{content:'';position:absolute;top:4px;left:4px;width:6px;height:6px;background:white;border-radius:50%}
.opt-row input[type="radio"]:focus-visible{outline:2px solid var(--primary);outline-offset:2px}
.opt-row input.opt-input{flex:1;border:none;background:transparent;padding:4px 0;font-size:.875rem;color:var(--ink);outline:none;font-family:inherit}
.opt-row .opt-del{background:none;border:none;font-size:18px;color:var(--muted);cursor:pointer;padding:0 2px;line-height:1;transition:color .12s}
.opt-row .opt-del:hover{color:var(--error)}

/* Section separator */
.sec-hr{border:none;border-top:1px solid var(--border);margin:24px 0}
.sec-heading{font-size:.75rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;display:flex;align-items:center;gap:8px}

/* Data table */
.data-table-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:12px;background:var(--surface)}
.data-table{width:100%;border-collapse:collapse;font-size:.8125rem}
.data-table th{text-align:left;padding:10px 14px;font-size:.6875rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0}
.data-table td{padding:10px 14px;border-bottom:1px solid var(--border);vertical-align:middle;line-height:1.5}
.data-table tr:last-child td{border-bottom:none}
.data-table tr:hover td{background:oklch(0 0 0 / .015)}
.student-name{font-weight:600;color:var(--ink)}
.cell-mono{font-variant-numeric:tabular-nums;font-size:.8125rem}

/* Stats grid */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:28px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px 16px;text-align:center;transition:box-shadow .15s}
.stat-card:hover{box-shadow:0 2px 12px oklch(0 0 0 / .04)}
.stat-card .stat-num{font-size:1.75rem;font-weight:800;color:var(--primary);line-height:1.1}
.stat-card .stat-lbl{font-size:.75rem;color:var(--muted);margin-top:4px;text-transform:uppercase;letter-spacing:.04em;font-weight:600}

/* Empty state */
.empty-state{text-align:center;padding:48px 24px;color:var(--muted)}
.empty-state .empty-icon{font-size:2rem;margin-bottom:12px}
.empty-state h3{font-size:1rem;font-weight:600;color:var(--ink);margin-bottom:6px}
.empty-state p{font-size:.875rem;line-height:1.6;max-width:360px;margin:0 auto 16px}

/* Utility */
.move-btn{background:none;border:1px solid var(--border);border-radius:4px;cursor:pointer;padding:2px 7px;font-size:.7rem;line-height:1;transition:all .12s;color:var(--muted);font-family:inherit}
.move-btn:hover{background:var(--primary);border-color:var(--primary);color:var(--ink)}
.search-input{padding:8px 14px;border:1.5px solid var(--border);border-radius:var(--radius);font-size:.875rem;width:100%;box-sizing:border-box;background:var(--bg);color:var(--ink);transition:border-color .15s;font-family:inherit}
.search-input:focus{border-color:var(--primary);outline:none;box-shadow:0 0 0 3px oklch(0.8 0.15 85 / .15)}
.upload-progress{display:flex;align-items:center;gap:10px;margin:6px 0}
.upload-progress-bar{flex:1;height:6px;background:var(--border);border-radius:99px;overflow:hidden}
.upload-progress-fill{height:100%;background:var(--primary);border-radius:99px;transition:width .3s}
.upload-progress-text{font-size:.75rem;color:var(--muted);min-width:36px;text-align:right}
.tag{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:4px;font-size:.6875rem;font-weight:600;line-height:1.5}
.tag-success{background:oklch(0.6 0.155 145 / .12);color:var(--success)}
.tag-warning{background:oklch(0.72 0.14 85 / .12);color:var(--warning)}
.tag-neutral{background:var(--border);color:var(--muted)}

/* Word import */
.word-import-list{display:flex;flex-direction:column;gap:6px;max-height:400px;overflow-y:auto;margin:12px 0}
.wi-item{padding:10px 12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);font-size:.8125rem}
.wi-item .wi-q{font-weight:600;margin-bottom:4px}
.wi-item .wi-opts{display:flex;flex-direction:column;gap:2px;color:var(--muted)}
.wi-item .wi-opts .wi-correct{color:var(--success);font-weight:600}

/* Remaining old-style selectors kept for compatibility */
.modal-math-preview{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 16px;margin:-6px 0 10px;text-align:center;font-size:1.1rem;display:none;overflow-x:auto}
.modal-math-preview .kp-line{margin:6px 0}
.math-field-wrap{position:relative}
.math-field-wrap textarea#f-q-math{min-height:90px;font-family:'SFMono-Regular',Consolas,Menlo,monospace;font-size:.8125rem;line-height:1.5}
.math-toolbar{display:flex;gap:8px;align-items:center;margin:-4px 0 8px}
.btn-word-paste{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;font-size:.75rem;font-weight:600;border-radius:var(--radius);border:1.5px solid var(--border);background:var(--surface);color:var(--ink);cursor:pointer;transition:border-color .15s,background .15s;font-family:inherit}
.btn-word-paste:hover{border-color:var(--primary);background:oklch(0.8 0.15 85 / .1)}
.math-hint{font-size:.6875rem;color:var(--muted);margin:-4px 0 8px}
.word-paste-box{background:var(--surface);border:1.5px dashed var(--border);border-radius:var(--radius);padding:14px;margin:0 0 12px}
.word-paste-box textarea{min-height:80px;font-family:'SFMono-Regular',Consolas,Menlo,monospace;font-size:.8125rem}
.word-paste-box .wpb-actions{display:flex;gap:8px;margin-top:6px}
.word-paste-box .wpb-title{font-size:.75rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center}
.word-paste-box .wpb-close{background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;line-height:1;padding:0}
.word-paste-box .wpb-close:hover{color:var(--error)}
.q-img-preview{max-width:120px;max-height:80px;border-radius:6px;border:1px solid var(--border);margin:2px 0;cursor:pointer;transition:transform .15s}
.q-img-preview:hover{transform:scale(1.8);z-index:var(--z-tooltip);position:relative}
.opt-img-btn{font-size:.65rem;padding:2px 6px;border-radius:4px;border:1px solid var(--border);background:var(--surface);cursor:pointer;flex-shrink:0;transition:border-color .12s;font-family:inherit}
.opt-img-btn:hover{border-color:var(--primary)}
.opt-img-btn.has-image{background:oklch(0.6 0.155 145 / .12);border-color:var(--success)}
.opt-row .opt-img{max-width:40px;max-height:40px;border-radius:4px;border:1px solid var(--border);flex-shrink:0;object-fit:cover}

/* Category cards */
.cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
.cat-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;cursor:pointer;transition:all .15s}
.cat-card:hover{border-color:var(--primary);box-shadow:0 2px 12px oklch(0 0 0 / .06)}
.cat-card .cat-name{font-weight:700;font-size:.875rem;margin-bottom:2px}
.cat-card .cat-desc{font-size:.75rem;color:var(--muted);margin-bottom:8px}
.cat-card .cat-count{font-size:.6875rem;color:var(--muted);display:flex;gap:8px}
.cat-actions{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
/* Category import question list */
.ci-row{display:flex;align-items:flex-start;gap:12px;padding:12px 14px;border-bottom:1px solid var(--border);transition:background .1s}
.ci-row:hover{background:oklch(0 0 0 / .015)}
.ci-row .cat-q-check{margin-top:3px;width:16px;height:16px;flex-shrink:0;accent-color:var(--primary)}
.ci-body{flex:1;min-width:0}
.ci-text{font-size:.8125rem;font-weight:500;color:var(--ink);line-height:1.5;margin-bottom:2px}
.ci-meta{font-size:.6875rem;color:var(--muted)}
.ci-img-wrap img{max-width:120px;max-height:80px;border-radius:6px;border:1px solid var(--border);cursor:pointer;object-fit:cover;transition:opacity .15s;display:block;margin-bottom:4px}
.ci-img-wrap img:hover{opacity:.8}
.ci-actions{display:flex;gap:8px;margin-top:16px;padding-top:16px;border-top:1px solid var(--border);justify-content:flex-end;flex-wrap:wrap}
/* System Stats page */
.sys-page{animation:fadeSlide .2s ease}
.sys-header{margin-bottom:28px}
.sys-header h1{font-size:1.25rem;font-weight:700;margin:0 0 4px}
.sys-header p{font-size:.8125rem;color:var(--muted);margin:0}
.sys-section{margin-bottom:28px}

<body>

<script>
const SUPABASE_URL = 'https://usllnkoqqpfynsiprvqh.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVzbGxua29xcXBmeW5zaXBydnFoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM3MTYxMzgsImV4cCI6MjA5OTI5MjEzOH0.JbWJo9S7phVksNx8ib8zXY6QkHy-6FpLT-vDedEFp_g';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
let adminUser = null;
let adminProfile = null;

function showModal(html) { document.getElementById('admin-modal-body').innerHTML = html; document.getElementById('admin-modal').classList.add('show'); }
function hideModal() { document.getElementById('admin-modal').classList.remove('show'); }
document.getElementById('admin-modal').onclick = function(e) { if (e.target === this) hideModal(); };

let pendingMFAChallenge = null;
let pendingEnrollFactorId = null;

async function adminLogin() {
  const email = document.getElementById('admin-email').value;
  const pass = document.getElementById('admin-password').value;
  const errEl = document.getElementById('admin-login-error'); errEl.textContent = '';
  const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
  if (error) { errEl.textContent = error.message; return; }
  adminUser = data.user;
  const { data: profile } = await sb.from('profiles').select('*').eq('id', adminUser.id).single();
  if (!profile || profile.role !== 'admin') { await sb.auth.signOut(); errEl.textContent = 'Not authorized as admin'; return; }
  adminProfile = profile;
  const { data: factors } = await sb.auth.mfa.listFactors();
  const totpFactor = factors.all?.find(f => f.factor_type === 'totp' && f.status === 'verified');
  if (totpFactor) {
    const chal = await sb.auth.mfa.challenge({ factorId: totpFactor.id });
    if (chal.error) { await sb.auth.signOut(); errEl.textContent = chal.error.message; return; }
    pendingMFAChallenge = chal.data;
    document.getElementById('admin-login').classList.add('hidden');
    document.getElementById('admin-mfa').classList.remove('hidden');
    document.getElementById('admin-mfa-code').value = '';
    document.getElementById('admin-mfa-error').textContent = '';
    document.getElementById('admin-mfa-code').focus();
    return;
  }
  document.getElementById('admin-login').classList.add('hidden');
  document.getElementById('admin-dashboard').classList.remove('hidden');
  document.getElementById('mfa-enroll-btn').style.display = '';
  loadAdminPage('dashboard');
}
function adminLogout() { sb.auth.signOut(); adminUser = null; adminProfile = null; document.getElementById('admin-login').classList.remove('hidden'); document.getElementById('admin-dashboard').classList.add('hidden'); document.getElementById('admin-mfa').classList.add('hidden'); document.getElementById('mfa-enroll-btn').style.display = 'none'; }

async function verifyMFA() {
  const code = document.getElementById('admin-mfa-code').value.replace(/\D/g, '');
  const errEl = document.getElementById('admin-mfa-error'); errEl.textContent = '';
  if (code.length !== 6) { errEl.textContent = 'Enter a valid 6-digit code'; return; }
  const { error } = await sb.auth.mfa.verify({ factorId: pendingMFAChallenge.factor_id, challengeId: pendingMFAChallenge.id, code });
  if (error) { errEl.textContent = error.message; return; }
  document.getElementById('admin-mfa').classList.add('hidden');
  document.getElementById('admin-dashboard').classList.remove('hidden');
  document.getElementById('mfa-enroll-btn').style.display = '';
  loadAdminPage('dashboard');
}
function cancelMFA() { sb.auth.signOut(); adminUser = null; document.getElementById('admin-mfa').classList.add('hidden'); document.getElementById('admin-login').classList.remove('hidden'); }

async function enrollMFA() {
  const { data: existing } = await sb.auth.mfa.listFactors();
  for (const f of (existing.all || [])) {
    if (f.factor_type === 'totp' || f.type === 'totp') {
      await sb.auth.mfa.unenroll({ factorId: f.id }).catch(() => {});
    }
  }
  const name = 'admin-totp-' + Date.now();
  const { data, error } = await sb.auth.mfa.enroll({ factorType: 'totp', friendlyName: name });
  if (error) { alert('MFA error: ' + error.message); return; }
  pendingEnrollFactorId = data.id;
  showModal('<h3 style="margin-bottom:8px">Setup Two-Factor Auth</h3><p style="color:var(--muted);font-size:.875rem;margin-bottom:16px">Scan this QR code with Google Authenticator or Authy</p><div style="text-align:center;background:#fff;padding:16px;border-radius:12px;margin-bottom:16px"><img src="' + data.totp.qr_code + '" alt="QR Code" style="width:180px;height:180px;border-radius:8px;display:block;margin:0 auto"></div><p style="font-size:.75rem;color:var(--muted);margin-bottom:16px;word-break:break-all">Or enter key: <code style="background:var(--surface);padding:2px 6px;border-radius:4px;font-size:.75rem">' + data.totp.secret + '</code></p><input type="text" id="enroll-mfa-code" class="admin-input" placeholder="Enter 6-digit code" maxlength="6" inputmode="numeric" style="margin-bottom:8px"><button class="btn btn-primary" onclick="verifyEnrollment()" style="width:100%;justify-content:center">Verify &amp; Enable</button><p id="enroll-mfa-error" style="color:var(--error);margin-top:8px;font-size:.875rem"></p>');
}
async function verifyEnrollment() {
  const code = document.getElementById('enroll-mfa-code').value.replace(/\D/g, '');
  const errEl = document.getElementById('enroll-mfa-error'); errEl.textContent = '';
  if (code.length !== 6) { errEl.textContent = 'Enter a valid 6-digit code'; return; }
  const chal = await sb.auth.mfa.challenge({ factorId: pendingEnrollFactorId });
  if (chal.error) { errEl.textContent = chal.error.message; return; }
  const { error } = await sb.auth.mfa.verify({ factorId: pendingEnrollFactorId, challengeId: chal.data.id, code });
  if (error) { errEl.textContent = error.message; return; }
  hideModal();
  showModal('<h3 style="margin-bottom:8px">MFA Enabled</h3><p style="color:var(--muted);font-size:.875rem">Two-factor authentication is now active for admin access.</p><button class="btn btn-primary" onclick="hideModal()" style="margin-top:16px;width:100%;justify-content:center">Done</button>');
  document.getElementById('mfa-enroll-btn').style.display = 'none';
}

function loadAdminPage(page) {
  if (page === 'dashboard') loadDashboard();
  else if (page === 'courses') loadAdminCourses();
  else if (page === 'categories') loadAdminCategories();
  else if (page === 'students') loadAdminStudents();
  else if (page === 'admins') loadAdminAdmins();
  else if (page === 'stats') loadAdminStats();
  else if (page === 'site') loadAdminSite();
}

function switchAdminPage(page, el) {
  document.querySelectorAll('.admin-sidebar a').forEach(a => a.classList.remove('active'));
  if (el) el.classList.add('active');
  document.querySelectorAll('.admin-page').forEach(p => p.classList.remove('active'));
  document.getElementById('admin-page-' + page).classList.add('active');
  loadAdminPage(page);
}

// ========== DASHBOARD ==========
async function loadDashboard() {
  const el = document.getElementById('admin-page-dashboard');
  el.innerHTML = '<div style="text-align:center;padding:48px;color:var(--muted)">Loading…</div>';
  try {

function previewTeacherPhoto(e) {
  var file = e.target.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(ev) {
    setTeacherPhoto(ev.target.result);
  };

async function moveLesson(id, courseId, dir) {
  const { data: lessons } = await sb.from('lessons').select('id, sort_order').eq('course_id', courseId).order('sort_order');
  const idx = lessons.findIndex(l => l.id === id);
  if (idx < 0 || (dir < 0 && idx === 0) || (dir > 0 && idx === lessons.length - 1)) return;
  const swapIdx = idx + dir;
  const a = lessons[idx].sort_order || idx;
  const b = lessons[swapIdx].sort_order || swapIdx;
  await sb.from('lessons').update({ sort_order: b }).eq('id', lessons[idx].id);
  await sb.from('lessons').update({ sort_order: a }).eq('id', lessons[swapIdx].id);
  loadAdminCourses();
}

async function uploadCourseImg(file) {
  var ext = file.name.split('.').pop();
  var path = 'courses/' + Date.now() + '.' + ext;
  var progressEl = document.getElementById('f-c-img-progress');
  var barEl = document.getElementById('f-c-img-bar');
  var textEl = document.getElementById('f-c-img-text');
  if (progressEl) { progressEl.style.display = 'flex'; textEl.textContent = '0%'; barEl.style.width = '0%'; }
  var { data: { session } } = await sb.auth.getSession();
  var token = session?.access_token || '';
  return new Promise(function(resolve) {
    var xhr = new XMLHttpRequest();
    xhr.open('POST', SUPABASE_URL + '/storage/v1/object/question-images/' + path);
    xhr.setRequestHeader('authorization', 'Bearer ' + token);
    xhr.setRequestHeader('x-upsert', 'true');
    xhr.upload.onprogress = function(e) {
      if (!e.lengthComputable) return;
      var pct = Math.round((e.loaded / e.total) * 100);
      if (barEl) barEl.style.width = pct + '%';
      if (textEl) textEl.textContent = pct + '%';
    };
    xhr.onload = function() {
      if (xhr.status >= 200 && xhr.status < 300) {
        if (textEl) textEl.textContent = 'Complete';
        if (barEl) barEl.style.width = '100%';
        resolve(SUPABASE_URL + '/storage/v1/object/public/question-images/' + path);
      } else {
        alert('Upload error');
        if (progressEl) progressEl.style.display = 'none';
        resolve(null);
      }
    };
    xhr.onerror = function() { alert('Network error'); if (progressEl) progressEl.style.display = 'none'; resolve(null); };
    xhr.send(file);
  });
}

async function duplicateLesson(id, courseId) {
  const { data: orig } = await sb.from('lessons').select('*').eq('id', id).single();
  if (!orig) return;
  const { data: lectures } = await sb.from('lectures').select('*').eq('lesson_id', id).order('sort_order');
  const { data: hws } = await sb.from('homework').select('*, hw_questions:hw_questions(*)').eq('lesson_id', id);
  const { data: exms } = await sb.from('exams').select('*, exam_questions:exam_questions(*)').eq('lesson_id', id);
  const { data: maxOrder } = await sb.from('lessons').select('sort_order').eq('course_id', courseId).order('sort_order', { ascending: false }).limit(1);
  const newOrder = (maxOrder?.[0]?.sort_order || 0) + 1;
  const { data: newL, error } = await sb.from('lessons').insert({ course_id: courseId, title: orig.title + ' (copy)', topic: orig.topic, description: orig.description, sort_order: newOrder }).select('id').single();
  if (error) { alert('Error: ' + error.message); return; }
  const newId = newL.id;
  for (const lec of lectures || []) {
    await sb.from('lectures').insert({ lesson_id: newId, title: lec.title, content: lec.content, math: lec.math, type: lec.type, sort_order: lec.sort_order });
  }
  const hw = hws?.[0];
  if (hw) {
    const { data: newHW } = await sb.from('homework').insert({ lesson_id: newId, pass_score: hw.pass_score }).select('id').single();
    if (newHW) for (const q of hw.hw_questions || []) await sb.from('hw_questions').insert({ homework_id: newHW.id, question: q.question, options: q.options, correct: q.correct, sort_order: q.sort_order });
  }
  const ex = exms?.[0];
  if (ex) {
    const { data: newEx } = await sb.from('exams').insert({ lesson_id: newId, pass_score: ex.pass_score }).select('id').single();
    if (newEx) for (const q of ex.exam_questions || []) await sb.from('exam_questions').insert({ exam_id: newEx.id, question: q.question, options: q.options, correct: q.correct, sort_order: q.sort_order });
  }
  loadAdminCourses();
}

async function uploadVideo(file, lessonId, progressEl, barEl, textEl) {
  const ext = file.name.split('.').pop();
  const path = lessonId + '/' + Date.now() + '.' + ext;
  if (progressEl) { progressEl.style.display = 'flex'; textEl.textContent = '0%'; barEl.style.width = '0%'; }
  const { data: { session } } = await sb.auth.getSession();
  const token = session?.access_token || '';
  return new Promise((resolve) => {
    const xhr = new XMLHttpRequest();
    xhr.open('POST', SUPABASE_URL + '/storage/v1/object/videos/' + path);
    xhr.setRequestHeader('authorization', 'Bearer ' + token);
    xhr.setRequestHeader('x-upsert', 'true');
    xhr.upload.onprogress = (e) => {
      if (!e.lengthComputable) return;
      const pct = Math.round((e.loaded / e.total) * 100);
      if (barEl) barEl.style.width = pct + '%';
      if (textEl) textEl.textContent = pct + '%';
      if (pct >= 100 && textEl) textEl.textContent = 'Processing...';
    };
    xhr.onload = () => {
      if (xhr.status >= 200 && xhr.status < 300) {
        if (textEl) textEl.textContent = 'Complete';
        if (barEl) barEl.style.width = '100%';
        resolve(path);
      } else {
        let msg = 'Upload error';
        try { const r = JSON.parse(xhr.responseText); msg = r.error || r.message || msg; } catch(e) {}
        alert(msg);
        if (progressEl) progressEl.style.display = 'none';
        resolve(null);
      }
    };
    xhr.onerror = () => { alert('Network error'); if (progressEl) progressEl.style.display = 'none'; resolve(null); };
    xhr.send(file);
  });
}
function collectVideoUrl() {
  var qualityLabels = ['1080p','720p','480p','360p','Auto'];
  var qs = {};
  qualityLabels.forEach(function(ql) {
    var el = document.getElementById('f-lect-q-' + ql);
    if (el && el.value.trim()) qs[ql] = el.value.trim();
  });
  if (Object.keys(qs).length === 0) return '';
  if (Object.keys(qs).length === 1) {
    var only = qs[Object.keys(qs)[0]];
    if (only.startsWith('http')) return only;
  }
  return JSON.stringify(qs);
}

let _optImagePaths = [];
let _qImagePath = null;

function uploadImageToStorage(file, prefix, idx, onProgress) {
  return new Promise(async (resolve) => {
    const ext = file.name.split('.').pop();
    const path = prefix + '_' + Date.now() + (idx !== undefined ? '_' + idx : '') + '.' + ext;
    const { data: { session } } = await sb.auth.getSession();
    const token = session?.access_token || '';
    const xhr = new XMLHttpRequest();
    xhr.open('POST', SUPABASE_URL + '/storage/v1/object/question-images/' + path);
    xhr.setRequestHeader('authorization', 'Bearer ' + token);
    xhr.setRequestHeader('x-upsert', 'true');
    if (onProgress && xhr.upload) xhr.upload.onprogress = onProgress;
    xhr.onload = function() {
      if (xhr.status >= 200 && xhr.status < 300) resolve(path);
      else resolve(null);
    };
    xhr.onerror = function() { resolve(null); };
    xhr.send(file);
  });
}

function uploadOptImage(btn, idx) {

      if (e.lengthComputable) btn.textContent = Math.round(e.loaded / e.total * 100) + '%';
    });
    if (path) {
      btn.textContent = '✅';

      const existing = btn.parentElement.querySelector('.opt-img');

        const img = document.createElement('img');

        img.src = SUPABASE_URL + '/storage/v1/object/public/question-images/' + path;
        img.onclick = function() { window.open(this.src); };

function convertWordMathToLatex(raw) {
  if (!raw) return '';
  let s = raw;
  s = s.replace(/\u00A0/g, ' ').replace(/[\u200B-\u200F\uFEFF]/g, '');
  const fractionMap = {
    '½': '\\frac{1}{2}', '⅓': '\\frac{1}{3}', '⅔': '\\frac{2}{3}',
    '¼': '\\frac{1}{4}', '¾': '\\frac{3}{4}', '⅕': '\\frac{1}{5}',
    '⅖': '\\frac{2}{5}', '⅗': '\\frac{3}{5}', '⅘': '\\frac{4}{5}',
    '⅙': '\\frac{1}{6}', '⅚': '\\frac{5}{6}', '⅛': '\\frac{1}{8}',
    '⅜': '\\frac{3}{8}', '⅝': '\\frac{5}{8}', '⅞': '\\frac{7}{8}'
  };
  for (const [ch, tex] of Object.entries(fractionMap)) s = s.split(ch).join(tex);
  const supMap = { '⁰':'0','¹':'1','²':'2','³':'3','⁴':'4','⁵':'5','⁶':'6','⁷':'7','⁸':'8','⁹':'9','⁺':'+','⁻':'-','ⁿ':'n' };
  s = s.replace(/([A-Za-z0-9\)\]])([⁰¹²³⁴⁵⁶⁷⁸⁹⁺⁻ⁿ]+)/g, (m, base, sup) => {
    const mapped = sup.split('').map(c => supMap[c] || c).join('');
    return base + '^{' + mapped + '}';
  });
  const subMap = { '₀':'0','₁':'1','₂':'2','₃':'3','₄':'4','₅':'5','₆':'6','₇':'7','₈':'8','₉':'9' };
  s = s.replace(/([A-Za-z0-9\)\]])([₀₁₂₃₄₅₆₇₈₉]+)/g, (m, base, sub) => {
    const mapped = sub.split('').map(c => subMap[c] || c).join('');
    return base + '_{' + mapped + '}';
  });
  s = s.replace(/∜\(([^()]+)\)/g, '\\sqrt[4]{$1}');
  s = s.replace(/∛\(([^()]+)\)/g, '\\sqrt[3]{$1}');
  s = s.replace(/√\(([^()]+)\)/g, '\\sqrt{$1}');
  s = s.replace(/∜([A-Za-z0-9]+)/g, '\\sqrt[4]{$1}');
  s = s.replace(/∛([A-Za-z0-9]+)/g, '\\sqrt[3]{$1}');
  s = s.replace(/√([A-Za-z0-9]+)/g, '\\sqrt{$1}');
  const symbolMap = {
    '×': '\\times ', '÷': '\\div ', '·': '\\cdot ', '∙': '\\cdot ',
    '≤': '\\leq ', '≥': '\\geq ', '≠': '\\neq ', '≈': '\\approx ', '≡': '\\equiv ',
    '≅': '\\cong ', '≃': '\\simeq ', '∝': '\\propto ',
    '±': '\\pm ', '∓': '\\mp ',
    'π': '\\pi ', 'θ': '\\theta ', 'α': '\\alpha ', 'β': '\\beta ', 'γ': '\\gamma ',
    'δ': '\\delta ', 'ε': '\\varepsilon ', 'λ': '\\lambda ', 'μ': '\\mu ',
    'σ': '\\sigma ', 'τ': '\\tau ', 'φ': '\\phi ', 'ω': '\\omega ',
    'Δ': '\\Delta ', 'Σ': '\\sum ', 'Π': '\\prod ', 'Ω': '\\Omega ',
    '∞': '\\infty ', '∫': '\\int ', '∬': '\\iint ', '∂': '\\partial ',
    '∇': '\\nabla ', '∀': '\\forall ', '∃': '\\exists ',
    '∈': '\\in ', '∉': '\\notin ', '⊂': '\\subset ', '⊆': '\\subseteq ',
    '⊃': '\\supset ', '⊇': '\\supseteq ', '∪': '\\cup ', '∩': '\\cap ',
    '∅': '\\emptyset ', '∧': '\\wedge ', '∨': '\\vee ',
    '→': '\\rightarrow ', '←': '\\leftarrow ', '⇒': '\\Rightarrow ',
    '⇐': '\\Leftarrow ', '↔': '\\leftrightarrow ', '⇔': '\\Leftrightarrow ',
    '∴': '\\therefore ', '∵': '\\because ',
    '⊥': '\\perp ', '∥': '\\parallel ', '∠': '\\angle ',
    '°': '^{\\circ}', '√': '\\sqrt', '∛': '\\sqrt[3]', '∜': '\\sqrt[4]',
    'ℕ': '\\mathbb{N}', 'ℤ': '\\mathbb{Z}', 'ℚ': '\\mathbb{Q}', 'ℝ': '\\mathbb{R}', 'ℂ': '\\mathbb{C}'
  };
  for (const [ch, tex] of Object.entries(symbolMap)) s = s.split(ch).join(tex);
  s = s.split('\n').map(line => line.replace(/[ \t]+/g, ' ').trim()).join('\n');
  return s;
}

function handleMathFieldPaste(event) {
  const cd = event.clipboardData || window.clipboardData;
  if (!cd) return;
  const text = cd.getData('text/plain');
  if (!text) return;
  if (/[√×÷≤≥≠±πθαβγΔδΣΠ∞∫∂∈∉⊂⊆∪∩→⇒↔°½⅓⅔¼¾⁰¹²³⁴⁵⁶⁷⁸⁹₀₁₂₃₄₅₆₇₈₉]/.test(text)) {
    event.preventDefault();
    const converted = convertWordMathToLatex(text);
    const ta = event.target;
    const start = ta.selectionStart, end = ta.selectionEnd;
    ta.value = ta.value.slice(0, start) + converted + ta.value.slice(end);
    ta.selectionStart = ta.selectionEnd = start + converted.length;
    previewMath();
  }
}

function wordPasteBoxPreview() {
  const input = document.getElementById('f-wpb-input');
  const preview = document.getElementById('f-wpb-preview');
  if (!input || !preview) return;
  const converted = convertWordMathToLatex(input.value);

}

function insertWordPasteResult() {
  const input = document.getElementById('f-wpb-input');
  const mathField = document.getElementById('f-q-math');
  if (!input || !mathField) return;
  const converted = convertWordMathToLatex(input.value);
  if (!converted.trim()) return;
  const sep = mathField.value.trim() ? '\n' : '';
  mathField.value = mathField.value + sep + converted;
  previewMath();
  toggleWordPasteBox();
  mathField.focus();
}

let _allStudentData = null;
async function loadAdminStudents() {
  const [profilesR, coursesR] = await Promise.all([
    sb.from('profiles').select('*, progress:progress(*)').eq('role', 'student'),
    sb.from('courses').select('*, lessons:lessons(*)').order('sort_order')
  ]);
  const profiles = profilesR.data || [];
  const courses = coursesR.data || [];
  _allStudentData = { profiles, courses };
  renderStudents('', profiles, courses);
}
function renderStudents(search, profiles, courses) {
  const q = search.toLowerCase();
  const filtered = profiles.filter(p => (p.name||'').toLowerCase().includes(q) || (p.id||'').toLowerCase().includes(q));
  let html = '<div class="admin-header"><h1>Students</h1><div style="display:flex;gap:8px"><input class="search-input" style="width:200px" placeholder="Search by name..." oninput="filterStudents(this.value)"><button class="btn btn-ghost btn-sm" onclick="exportCSV()">Export CSV</button></div></div>';
  if (filtered.length === 0) {
    html += '<div class="empty-state"><div class="empty-icon">👤</div><h3>No students found</h3><p>Students will appear here once they sign up and start learning.</p></div>';
  } else {
    html += '<div class="data-table-wrap"><table class="data-table"><thead><tr><th>Student</th><th>Progress</th><th>Completed</th><th style="text-align:right">Actions</th></tr></thead><tbody>';
    filtered.forEach(p => {
      const name = p.name || 'Unknown';
      const prog = p.progress || [];
      const totalLessons = courses.reduce((acc, c) => acc + (c.lessons||[]).length, 0);
      const completedLessons = prog.filter(p => p.exam_completed).length;
      const pct = totalLessons > 0 ? Math.round(completedLessons / totalLessons * 100) : 0;
      const avgHw = prog.filter(p => p.hw_score != null).reduce((s, p) => s + p.hw_score, 0);
      const avgHwCount = prog.filter(p => p.hw_score != null).length;
      const hwAvg = avgHwCount > 0 ? Math.round(avgHw / avgHwCount) : null;
      html += '<tr><td><div class="student-name">' + esc(name) + '</div><span class="cell-mono" style="color:var(--muted);font-size:.75rem">' + p.id.slice(0,8) + '</span></td>';
      html += '<td><div style="display:flex;align-items:center;gap:8px"><div style="flex:1;max-width:120px;height:6px;background:var(--border);border-radius:99px;overflow:hidden"><div style="height:100%;width:' + pct + '%;background:var(--primary);border-radius:99px;transition:width .3s"></div></div><span class="cell-mono">' + pct + '%</span></div></td>';
      html += '<td><span class="cell-mono">' + completedLessons + '/' + totalLessons + '</span>' + (hwAvg !== null ? '<br><span style="font-size:.75rem;color:var(--muted)">Avg HW: ' + hwAvg + '%</span>' : '') + '</td>';
      html += '<td style="text-align:right"><span class="tag tag-' + (pct >= 80 ? 'success' : pct >= 40 ? 'warning' : 'neutral') + '">' + (pct >= 80 ? 'On track' : pct >= 40 ? 'Progressing' : 'Getting started') + '</span></td></tr>';
    });
    html += '</tbody></table></div>';
  }
  document.getElementById('admin-page-students').innerHTML = html;
}
function filterStudents(val) {
  if (!_allStudentData) return;
  renderStudents(val, _allStudentData.profiles, _allStudentData.courses);
}
function exportCSV() {
  if (!_allStudentData) return;
  const { profiles, courses } = _allStudentData;
  const allLessons = [];
  let csv = 'Student,';
  courses.forEach(c => c.lessons?.sort((a,b) => (a.sort_order||0)-(b.sort_order||0)).forEach(l => { allLessons.push(l); csv += l.title + ',HW,Exam,'; }));
  csv += '\n';
  profiles.forEach(p => {
    const prog = p.progress || [];
    csv += (p.name || 'Unknown') + ',';
    allLessons.forEach(l => {
      const pp = prog.find(pr => pr.lesson_id === l.id);
      if (pp?.exam_completed) csv += '✓,' + (pp.hw_score ?? '—') + ',' + (pp.exam_score ?? '—') + ',';
      else csv += '—,' + (pp?.hw_score ?? '—') + ',' + (pp?.exam_score ?? '—') + ',';
    });
    csv += '\n';
  });
  const blob = new Blob([csv], { type: 'text/csv' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'student_progress.csv'; a.click();
}

    h += '<div class="admin-modal-footer"><button class="btn btn-primary" onclick="updateCatQ(' + id + ',' + catId + ',\'standard\')">Update</button><button class="btn btn-ghost" onclick="hideModal()">Cancel</button></div>';
    showModal(h);
  } else {
    _imgQPath = q.image_url || null;
    var h2 = '<h2>Edit Category Question</h2>';
    h2 += '<label>Question Image</label>';
    h2 += '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:10px">';
    h2 += '<button type="button" class="btn-word-paste" onclick="uploadCatQImage(this)">📷 Upload Image</button>';
    h2 += '<span style="font-size:.75rem;color:var(--muted)">or paste image directly</span></div>';
    h2 += '<div id="f-imgq-preview" style="margin-bottom:10px">' + (q.image_url ? '<img src="' + SUPABASE_URL + '/storage/v1/object/public/question-images/' + esc(q.image_url) + '" style="max-width:100%;max-height:300px;border-radius:var(--radius);border:1px solid var(--border);cursor:pointer" onclick="window.open(this.src)">' : '') + '</div>';
    h2 += '<label>Correct Answer</label><select id="f-imgq-correct">';
    for (var ci = 0; ci < 4; ci++) { var l = ['A','B','C','D'][ci]; h2 += '<option value="' + l + '"' + (q.correct_letter === l ? ' selected' : '') + '>' + l + '</option>'; }
    h2 += '</select>';
    h2 += '<label>Explanation</label><textarea id="f-imgq-expl" rows="2">' + esc(q.explanation||'') + '</textarea>';
    h2 += '<div class="admin-modal-footer"><button class="btn btn-primary" onclick="updateCatQ(' + id + ',' + catId + ',\'image\')">Update</button><button class="btn btn-ghost" onclick="hideModal()">Cancel</button></div>';
    showModal(h2);
  }
}
async function updateCatQ(id, catId, type) {
  var payload = {};
  if (type === 'standard') {
    var optsText = document.getElementById('f-catq-opts').value.trim();
    payload.question = document.getElementById('f-catq-q').value;
    payload.options = optsText ? optsText.split('\n').map(function(l) { return l.trim(); }).filter(Boolean) : ['A','B','C','D'];
    payload.correct = parseInt(document.getElementById('f-catq-correct').value) || 0;
    payload.math = document.getElementById('f-catq-math').value || '';
  } else {
    if (!_imgQPath) { alert('Image missing.'); return; }
    payload.image_url = _imgQPath;
    payload.correct_letter = document.getElementById('f-imgq-correct').value;
    payload.explanation = document.getElementById('f-imgq-expl').value || '';
  }
  await sb.from('category_questions').update(payload).eq('id', id);
  hideModal(); viewCategoryDetail(catId);
}
async function deleteCatQ(id, catId) {
  if (!confirm('Delete this question?')) return;
  await sb.from('category_questions').delete().eq('id', id);
  viewCategoryDetail(catId);
}

async function importSelectedCategoryQs(catId, targetType, targetId) {
  var checks = document.querySelectorAll('.cat-q-check:checked');
  if (checks.length === 0) { alert('Select at least one question.'); return; }
  var indices = Array.from(checks).map(function(c) { return parseInt(c.value); });
  var { data: qs } = await sb.from('category_questions').select('*').eq('category_id', catId).order('sort_order');
  if (!qs) return;
  var fk = targetType === 'exam' ? 'exam_id' : 'homework_id';
  var inserted = 0;
  for (var i = 0; i < indices.length; i++) {
    var q = qs[indices[i]];
    if (!q) continue;
    if (q.question_type === 'standard') {
      var payload = { question: q.question, options: q.options, correct: q.correct, math: q.math || '', image_url: q.image_url || '', option_images: q.option_images || [], sort_order: i + 1 };
      payload[fk] = targetId;
      if (targetType === 'exam') await sb.from('exam_questions').insert(payload);
      else await sb.from('hw_questions').insert(payload);
    } else {
      var payload2 = { image_url: q.image_url, correct: q.correct_letter || 'A', explanation: q.explanation || '', sort_order: i + 1 };
      payload2[fk] = targetId;
      if (targetType === 'exam') await sb.from('exam_image_questions').insert(payload2);
      else await sb.from('hw_image_questions').insert(payload2);
    }
    inserted++;
  }
  hideModal();
  alert('Imported ' + inserted + ' question(s) successfully.');
  manageContent(_contentLid);
}

// ========== WORD IMPORT ==========
async function importWordExam(examId, input) {
  const file = input.files?.[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async function(e) {
    const arrayBuffer = e.target.result;
    try {
      const result = await mammoth.extractRawText({ arrayBuffer: arrayBuffer });
      const text = result.value;
      if (!text.trim()) { alert('No text found in the Word file.'); return; }
      const questions = parseWordText(text);
      if (questions.length === 0) { alert('Could not detect any questions. Make sure questions are numbered (1., 2., etc.) with options (a., b., etc.) and correct answers marked with * or ✓.'); return; }
      showWordPreview(questions, examId);
    } catch (err) {
      alert('Error reading Word file: ' + err.message);
    }
  };
  reader.readAsArrayBuffer(file);
  input.value = '';
}

function parseWordText(text) {
  const lines = text.split('\n').map(l => l.trim()).filter(Boolean);
  const questions = [];
  let current = null;
  const qRegex = /^(?:(\d+)[.)\]-])\s*(.+)/;
  const optRegex = /^([a-zA-Z])[.)\])]\s*(.*)/;
  const optParenRegex = /^\(?([a-zA-Z])\)\s*(.*)/;
  const ansKeyRegex = /^(?:answer|key|solution|answers|keys|correct|الإجابات|الحل|المفتاح)/i;

  let inAnswerKey = false, errors = [];
  for (let li = 0; li < lines.length; li++) {
    const line = lines[li];
    if (ansKeyRegex.test(line) && /[:\-]/.test(line)) { inAnswerKey = true; continue; }
    if (inAnswerKey && /^\d/.test(line)) {
      const m = line.match(/^(\d+)[.)\]]?\s*[-–:]\s*([a-zA-Z])/);
      if (m) {
        const num = parseInt(m[1]), ans = m[2].toLowerCase();
        const q = questions.find(q => q.number === num);
        if (q) q.correct = ans.charCodeAt(0) - 97;
      }
      continue;
    }
    if (inAnswerKey) continue;

    const qMatch = line.match(qRegex);
    if (qMatch) {
      if (current && current.options.length >= 2) {
        if (current.correct === -1) { current.correct = 0; errors.push('Q' + current.number + ': no correct marker, defaulting to a'); }
        questions.push(current);
      }
      current = { number: parseInt(qMatch[1]), question: qMatch[2].trim(), options: [], correct: -1 };
      continue;
    }
    if (!current) continue;

    // Try option matching with * / ✓ stripped
    const cleanLine = line.replace(/^[*✓✔]\s*/, '');
    const isCorrect = line !== cleanLine;
    let optMatch = cleanLine.match(optRegex) || cleanLine.match(optParenRegex);
    if (optMatch) {
      current.options.push({ text: optMatch[2].trim(), letter: optMatch[1].toLowerCase(), correct: isCorrect });
      if (isCorrect) current.correct = optMatch[1].toLowerCase().charCodeAt(0) - 97;
      continue;
    }
    // True/False: line is literally "True" or "False"
    if (/^(true|false)$/i.test(line) && current.options.length < 2) {
      current.options.push({ text: line, letter: String.fromCharCode(97 + current.options.length), correct: isCorrect || /^true/i.test(line) });
      continue;
    }
    // Continuation
    if (current.options.length === 0) current.question += ' ' + line;
    else current.options[current.options.length - 1].text += ' ' + line;
  }
  if (current && current.options.length >= 2) {
    if (current.correct === -1) { current.correct = 0; errors.push('Q' + current.number + ': no correct marker, defaulting to a'); }
    questions.push(current);
  }
  if (errors.length) console.warn('Parser warnings:\n' + errors.join('\n'));
  return questions.map((q, i) => ({
    question: q.question,
    options: q.options.map(o => o.text),
    correct: Math.min(q.correct, q.options.length - 1),
    sort_order: i + 1
  }));
}

function showWordPreview(questions, examId) {
  let html = '<h2>📄 Import from Word — Preview</h2>';
  html += '<p style="font-size:.8125rem;color:var(--muted);margin:-8px 0 12px">Found ' + questions.length + ' question(s). Review and click Save to add them to the exam.</p>';
  html += '<div class="word-import-list">';
  questions.forEach((q, i) => {
    html += '<div class="wi-item"><div class="wi-q">' + (i + 1) + '. ' + esc(q.question) + '</div><div class="wi-opts">';
    q.options.forEach((o, oi) => {
      const prefix = String.fromCharCode(65 + oi);
      const cls = oi === q.correct ? ' wi-correct' : '';
      html += '<span class="' + cls + '">' + prefix + '. ' + esc(o) + (oi === q.correct ? ' ✓' : '') + '</span>';
    });
    html += '</div></div>';
  });
  html += '</div>';
  html += '<div class="admin-modal-footer"><button class="btn btn-primary" onclick="saveWordExam(' + examId + ')">Save All (' + questions.length + ')</button><button class="btn btn-ghost" onclick="hideModal()">Cancel</button></div>';
  showModal(html);
  window._wordQuestions = questions;
}

async function saveWordExam(examId) {
  const questions = window._wordQuestions || [];
  if (!questions.length) return;
  const { data: existing } = await sb.from('exam_questions').select('sort_order').eq('exam_id', examId).order('sort_order', { ascending: false }).limit(1);
  let nextOrder = (existing?.[0]?.sort_order || 0) + 1;
  for (const q of questions) {
    const { error } = await sb.from('exam_questions').insert({
      exam_id: examId,
      question: q.question,
      options: q.options,
      correct: q.correct,
      sort_order: nextOrder++
    });
    if (error) { console.error('Insert error:', error); }
  }
  window._wordQuestions = null;
  hideModal();
  manageContent(_contentLid);
}

function esc(s) { if (!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

// Global paste handler for image pasting into question/option inputs
document.addEventListener('paste', function(e) {
  if (!document.getElementById('admin-modal')?.classList.contains('show')) return;
  var items = e.clipboardData && e.clipboardData.items;
  if (!items) return;
  for (var i = 0; i < items.length; i++) {
    if (items[i].type.startsWith('image/')) {
      e.preventDefault();
      var file = items[i].getAsFile();
      if (!file) return;
      var target = document.activeElement;
      var isImgQ = !!document.getElementById('f-imgq-preview');
      var isQuestion = target && target.id === 'f-q-q';
      var isOption = target && target.classList.contains('opt-input');
      if (!isImgQ && !isQuestion && !isOption) return;
      if (isImgQ) {
        var progEl = document.getElementById('f-imgq-progress') || (function() {
          var p = document.createElement('div');
          p.id = 'f-imgq-progress';
          p.style.cssText = 'height:4px;background:var(--border);border-radius:99px;overflow:hidden;margin-bottom:4px';
          p.innerHTML = '<div id="f-imgq-progress-bar" style="height:100%;width:0%;background:var(--primary);border-radius:99px;transition:width .15s"></div>';
          var prev = document.getElementById('f-imgq-preview');
          if (prev) prev.parentNode.insertBefore(p, prev);
          return p;
        })();
        var bar = document.getElementById('f-imgq-progress-bar');
        uploadImageToStorage(file, 'imgq', undefined, function(e) {
          if (e.lengthComputable && bar) bar.style.width = Math.round(e.loaded / e.total * 100) + '%';
        }).then(function(path) {
          if (!path) return;
          _imgQPath = path;
          var prev = document.getElementById('f-imgq-preview');
          if (prev) prev.innerHTML = '<img src="' + SUPABASE_URL + '/storage/v1/object/public/question-images/' + path + '" style="max-width:100%;max-height:300px;border-radius:var(--radius);border:1px solid var(--border);cursor:pointer" onclick="window.open(this.src)">';
        });
        return;
      }
      var prefix = isQuestion ? 'q' : 'opt';
      var optIdx = undefined;
      if (isOption) {
        var rows = document.getElementById('admin-modal-body') && document.getElementById('admin-modal-body').querySelectorAll('.opt-row');
        if (rows) {
          for (var r = 0; r < rows.length; r++) {
            if (rows[r].contains(target)) { optIdx = r; break; }
          }
        }
      }
      var progBtn = isQuestion ? null : (optIdx !== undefined ? document.querySelector('.opt-row:nth-child(' + (optIdx+1) + ') .opt-img-btn') : null);
      if (isQuestion) {
        var pq = document.getElementById('f-q-img-preview');
        if (pq) pq.innerHTML = '<div style="height:4px;background:var(--border);border-radius:99px;overflow:hidden;margin-bottom:4px"><div id="f-q-upload-progress" style="height:100%;width:0%;background:var(--primary);border-radius:99px;transition:width .15s"></div></div>';
      }
      uploadImageToStorage(file, prefix, optIdx, function(e) {
        if (!e.lengthComputable) return;
        var pct = Math.round(e.loaded / e.total * 100);
        if (progBtn) progBtn.textContent = pct + '%';
        var pqBar = document.getElementById('f-q-upload-progress');
        if (pqBar) pqBar.style.width = pct + '%';
      }).then(function(path) {
        if (!path) { return; }
        if (optIdx !== undefined) {
          _optImagePaths[optIdx] = path;
          var row = target.closest('.opt-row');
          if (row) {
            var btn = row.querySelector('.opt-img-btn');
            if (btn) { btn.textContent = '\u2705'; btn.className = 'opt-img-btn has-image'; }
            var img = row.querySelector('.opt-img');
            if (!img) {
              img = document.createElement('img');
              img.className = 'opt-img';
              img.onclick = function() { window.open(this.src); };
              var ref = row.querySelector('.opt-img-btn');
              row.insertBefore(img, ref);
            }
            img.src = SUPABASE_URL + '/storage/v1/object/public/question-images/' + path;
          }
        } else {
          _qImagePath = path;
          var prev = document.getElementById('f-q-img-preview');
          if (prev) prev.innerHTML = '<img class="q-img-preview" src="' + SUPABASE_URL + '/storage/v1/object/public/question-images/' + path + '" onclick="window.open(this.src)">';
        }
      });
      return;
    }
  }
});
