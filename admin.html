  h += '<div style="font-size:.875rem;line-height:1.6;margin-bottom:16px;padding:12px;background:var(--surface);border-radius:var(--radius)">' + esc(t.message) + '</div>';
  if (t.admin_reply) {
    h += '<div style="font-size:.875rem;line-height:1.6;margin-bottom:16px;padding:12px;background:var(--primary-soft);border-radius:var(--radius);border-left:3px solid var(--primary)"><strong style="color:var(--primary)">Admin Reply:</strong><br>' + esc(t.admin_reply) + '</div>';
  }
  h += '<div style="display:flex;gap:8px;margin-top:16px">';
  if (t.status === 'open' || t.status === 'admin_replied') {
    h += '<button class="btn btn-primary" onclick="hideModal();showAdminReplyForm(' + t.id + ')">Reply</button>';
    h += '<button class="btn btn-ghost" style="color:var(--success)" onclick="hideModal();adminCloseTicket(' + t.id + ')">Close Ticket</button>';
  }
  h += '<button class="btn btn-ghost" onclick="hideModal()">Close</button></div>';
  showModal(h);
}
function showAdminReplyForm(tid) {
  var t = _allTickets.find(function(x) { return x.id === tid; });
  if (!t) return;
  var userName = t.profiles?.name || 'Unknown';
  var h = '<h2>Reply to Ticket #' + t.id + '</h2>';
  h += '<p style="font-size:.8125rem;color:var(--muted);margin-bottom:12px"><strong>' + esc(userName) + '</strong> wrote: ' + esc(t.subject) + '</p>';
  h += '<p style="font-size:.8125rem;padding:8px;background:var(--surface);border-radius:var(--radius);margin-bottom:12px">' + esc(t.message.substring(0,200)) + (t.message.length > 200 ? '...' : '') + '</p>';
  h += '<textarea id="f-admin-reply" rows="5" style="width:100%;resize:vertical;font-family:inherit;font-size:.875rem" placeholder="Write your reply..."></textarea>';
  h += '<div class="admin-modal-footer" style="margin-top:12px"><button class="btn btn-primary" onclick="adminSaveTicketReply(' + tid + ')">Send Reply</button><button class="btn btn-ghost" onclick="hideModal()">Cancel</button></div>';
  showModal(h);
}
async function adminSaveTicketReply(tid) {
  var reply = document.getElementById('f-admin-reply')?.value?.trim();
  if (!reply) { alert('Please write a reply.'); return; }
  await sb.from('support_tickets').update({ admin_reply: reply, status: 'admin_replied', updated_at: new Date().toISOString() }).eq('id', tid);
  hideModal();
  alert('Reply sent.');
  loadAdminSupport();
}
async function adminCloseTicket(tid) {
  if (!confirm('Close this ticket?')) return;
  await sb.from('support_tickets').update({ status: 'resolved', updated_at: new Date().toISOString() }).eq('id', tid);
  loadAdminSupport();
}
async function adminDeleteDevice(did) {
  if (!confirm('Remove this device registration?')) return;
  await sb.from('user_devices').delete().eq('id', did);
  loadAdminSupport();
}
function adminViewUserDevices(userId) {
  sb.from('user_devices').select('*').eq('user_id', userId).then(function(r) {
    var devices = r.data || [];
    sb.from('user_device_limits').select('max_devices').eq('user_id', userId).maybeSingle().then(function(limitR) {
      var maxD = limitR?.data?.max_devices ?? 2;
      var h = '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><h2 style="margin:0">User Devices</h2><span style="font-size:.8125rem;color:var(--muted)">Limit: ' + maxD + '</span></div>';
      if (devices.length === 0) {
        h += '<p style="color:var(--muted);font-size:.875rem">No registered devices.</p>';
      } else {
        h += '<div class="data-table-wrap"><table class="data-table" style="font-size:.8125rem"><thead><tr><th>Device</th><th>Name</th><th>Last Login</th><th style="text-align:right">Actions</th></tr></thead><tbody>';
        devices.forEach(function(d) {
          h += '<tr><td style="font-family:monospace;font-size:.7rem">' + esc(d.device_id) + '</td><td>' + esc(d.device_name) + '</td><td style="font-size:.75rem;color:var(--muted)">' + timeAgo(d.last_login) + '</td>';
          h += '<td style="text-align:right"><button class="btn btn-ghost btn-sm" style="color:var(--error);font-size:.7rem" onclick="adminDeleteDevice(' + d.id + ')">Remove</button></td></tr>';
        });
        h += '</tbody></table></div>';
      }
      h += '<div style="margin-top:16px;padding-top:12px;border-top:1px solid var(--border)">';
      h += '<label style="font-size:.8125rem;font-weight:600;display:block;margin-bottom:4px">Device Limit</label>';
      h += '<div style="display:flex;gap:8px;align-items:center"><input id="f-admin-device-limit" type="number" min="1" max="20" value="' + maxD + '" style="width:80px;padding:8px;border:1px solid var(--border);border-radius:var(--radius);font-size:.875rem">';
      h += '<button class="btn btn-primary btn-sm" onclick="adminSaveDeviceLimit(\'' + userId + '\')">Save</button></div></div>';
      h += '<div class="admin-modal-footer" style="margin-top:16px"><button class="btn btn-ghost" onclick="hideModal()">Close</button></div>';
      showModal(h);
    });
  });
}
async function adminSaveDeviceLimit(userId) {
  var val = parseInt(document.getElementById('f-admin-device-limit')?.value);
  if (!val || val < 1 || val > 20) { alert('Limit must be between 1 and 20.'); return; }
  var { error } = await sb.from('user_device_limits').upsert({ user_id: userId, max_devices: val }, { onConflict: 'user_id' });
  if (error) { alert('Error: ' + error.message); return; }
  hideModal();
  alert('Device limit updated to ' + val + '.');
  loadAdminSupport();
}

// Always show login form on page load
// ── Dynamic content reveal for admin pages ──
(function() {
  if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
  function animItems(items) {
    var fresh = []; items.forEach(function(el) { if (!el.classList.contains('sr-animated')) { fresh.push(el); el.classList.add('sr-animated'); } }); if (!fresh.length) return;
    fresh.forEach(function(el, i) { el.style.setProperty('--i', (i * 60) + 'ms'); el.classList.add('sr-item'); });
    requestAnimationFrame(function() { fresh.forEach(function(el) { el.classList.add('sr-in'); }); });
  }
  var dTimers = {};
  ['admin-page-courses','admin-page-students','admin-page-enrollments','admin-page-admins','admin-page-categories','admin-page-community','admin-page-support'].forEach(function(id) {
    var container = document.getElementById(id);
    if (!container) return;
    new MutationObserver(function() {
      clearTimeout(dTimers[id]); dTimers[id] = setTimeout(function() { animItems(container.querySelectorAll('.crs-card, .lessons-table, .st-row, .md-tabs, .sp-ticket')); }, 40);
    }).observe(container, { childList: true, subtree: true });
  });
  window.animItems = animItems;
})();
</script>
<div class="custom-cursor" id="custom-cursor"></div>
<div class="custom-ring" id="custom-ring"></div>
<script>
(function(){var c=document.getElementById('custom-cursor'),r=document.getElementById('custom-ring');if(!c||!r||'ontouchstart' in window||navigator.maxTouchPoints>0||window.matchMedia('(pointer:coarse)').matches||window.matchMedia('(prefers-reduced-motion:reduce)').matches)return;var mx=0,my=0,rx=0,ry=0;document.addEventListener('mousemove',function(e){mx=e.clientX;my=e.clientY;c.style.left=mx+'px';c.style.top=my+'px'});!function anim(){rx+=(mx-rx)*.18;ry+=(my-ry)*.18;r.style.left=rx+'px';r.style.top=ry+'px';requestAnimationFrame(anim)}();document.querySelectorAll('a,button,.btn,input,textarea,select,[role="button"]').forEach(function(el){el.addEventListener('mouseenter',function(){c.classList.add('active');r.classList.add('active')});el.addEventListener('mouseleave',function(){c.classList.remove('active');r.classList.remove('active')})});})();
</script>
